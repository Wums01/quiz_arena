<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #1d3557 0%, #0b132b 45%, #050814 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }
        .card-box {
            width: 100%;
            max-width: 760px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 36px 24px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.35);
        }
        .form-control, .form-select {
            border-radius: 16px;
            min-height: 54px;
        }
        .main-btn {
            background: #f4b400;
            color: #111;
            border: none;
            font-weight: 700;
            border-radius: 16px;
            padding: 14px 24px;
            width: 100%;
        }
        .main-btn:hover {
            background: #ffd24d;
            color: #111;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card-box mx-auto">
        <a href="/multiplayer/" class="text-white text-decoration-none">← Back</a>
        <h1 class="mt-3 mb-2">Create Room</h1>
        <p class="text-light opacity-75 mb-4">Set up a room and invite friends with your room code.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Host Name</label>
                <input type="text" name="host_name" class="form-control" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Category</label>
                <select name="category" class="form-select" required>
                    {% for category in categories %}
                        <option value="{{ category }}">{{ category }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="main-btn">Create Room</button>
        </form>
    </div>
</div>
</body>
</html>
