<!DOCTYPE html>
<html>
<head>
    <title>Quiz Arena - Leaderboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-white">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card bg-secondary border-0 shadow-lg rounded-4">
                    <div class="card-body p-4 p-md-5">

                        <h1 class="text-center mb-4">🏆 Leaderboard</h1>

                        {% if results %}
                        <div class="table-responsive">
                            <table class="table table-dark table-bordered align-middle text-center">
                                <thead>
                                    <tr>
                                        <th>Rank</th>
                                        <th>Player</th>
                                        <th>Category</th>
                                        <th>Score</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for result in results %}
                                    <tr>
                                        <td>{{ forloop.counter }}</td>
                                        <td>{{ result.player_name }}</td>
                                        <td>{{ result.category }}</td>
                                        <td>{{ result.score }}/{{ result.total_questions }}</td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                        {% else %}
                        <p class="text-center">No scores yet.</p>
                        {% endif %}

                        <div class="text-center mt-4">
                            <a href="/" class="btn btn-warning btn-lg">Back Home</a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
