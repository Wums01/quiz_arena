<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Arena - Result</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #1d3557 0%, #0b132b 45%, #050814 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .result-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 0;
        }

        .result-card {
            width: 100%;
            max-width: 700px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
            text-align: center;
            padding: 42px 24px;
        }

        .result-emoji {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .result-title {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .result-subtitle {
            font-size: 1.15rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
        }

        .result-meta {
            color: rgba(255,255,255,0.82);
            margin-bottom: 24px;
        }

        .score-box {
            margin: 26px auto 30px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 24px 18px;
            max-width: 320px;
        }

        .score-label {
            font-size: 1rem;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.85);
        }

        .score-value {
            font-size: 3.4rem;
            font-weight: 800;
            color: #f4b400;
            line-height: 1;
        }

        .score-note {
            margin-top: 10px;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.75);
        }

        .action-btn {
            border: none;
            font-weight: 600;
            border-radius: 14px;
            padding: 14px 24px;
            min-width: 180px;
            transition: 0.25s ease;
            text-decoration: none;
            display: inline-block;
        }

        .play-btn {
            background: #f4b400;
            color: #111;
            box-shadow: 0 10px 20px rgba(244, 180, 0, 0.25);
        }

        .play-btn:hover {
            background: #ffd24d;
            transform: translateY(-2px);
            color: #111;
        }

        .leaderboard-btn {
            background: transparent;
            color: white;
            border: 2px solid rgba(255,255,255,0.55);
        }

        .leaderboard-btn:hover {
            background: rgba(255,255,255,0.08);
            color: white;
            transform: translateY(-2px);
        }

        .action-group {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .result-card {
                margin: 20px;
                padding: 32px 18px;
                border-radius: 22px;
            }

            .result-title {
                font-size: 2rem;
            }

            .score-value {
                font-size: 2.8rem;
            }

            .action-btn {
                width: 100%;
            }

            .action-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container result-wrapper">
    <div class="result-card">
        <div class="result-emoji">🎉</div>

        <h1 class="result-title">Quiz Completed</h1>
        <p class="result-subtitle">Well done, {{ player_name }}!</p>
        <p class="result-meta"><strong>Category:</strong> {{ category }}</p>

        <div class="score-box">
            <p class="score-label">Your score is</p>
            <div class="score-value">{{ score }}/{{ total }}</div>
            <p class="score-note">Keep playing and beat your best score.</p>
        </div>

        {% if rank %}
<p class="text-center mt-3 fs-5">
    🏅 Your Rank: <strong>#{{ rank }}</strong>
</p>
{% endif %}

        <div class="action-group">
            <a href="/" class="action-btn play-btn">Play Again</a>
            <a href="/leaderboard/" class="action-btn leaderboard-btn">Leaderboard</a>
        </div>
    </div>

        <div 
           class="text-center mt-4 d-flex    justify-content-center gap-3 flex-wrap">
            <a href="{% url 'start' %}" class="btn btn-warning btn-lg">Play Again</a>
            <a href="{% url 'leaderboard' %}" class="btn btn-outline-light btn-lg">View Leaderboard</a>
      </div>

</div>


</body>
</html>
