<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Arena</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #1d3557 0%, #0b132b 45%, #050814 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .hero-card {
            width: 100%;
            max-width: 760px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .hero-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero-title {
            font-size: 3.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .hero-text {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.85);
            margin-bottom: 30px;
        }

        .start-btn {
            background: #f4b400;
            color: #111;
            border: none;
            font-weight: 600;
            padding: 14px 34px;
            border-radius: 14px;
            transition: 0.3s ease;
            box-shadow: 0 10px 20px rgba(244, 180, 0, 0.25);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            background: #ffd24d;
        }

        .mini-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .mini-badges span {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .hero-card {
                margin: 20px;
                padding: 32px 20px;
                border-radius: 22px;
            }

            .hero-title {
                font-size: 2.3rem;
            }

            .hero-text {
                font-size: 1rem;
            }

            .start-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero-card mx-auto">
            <div class="hero-icon">🎮</div>
            <h1 class="hero-title">Quiz Arena</h1>
            <p class="hero-text">Test your knowledge, challenge yourself, and become the champion.</p>

        <div class="d-flex flex-column flex-md-row justify-content-center gap-3 mt-4">
            <a href="/start/" class="btn start-btn btn-lg">Solo Game</a>
            <a href="/multiplayer/" class="btn btn-outline-light btn-lg rounded-4 px-4 py-3 fw-semibold">
                Multiplayer
           </a>
      </div>

            <div class="mini-badges">
                <span>Bible</span>
                <span>General</span>
                <span>Music</span>
                <span>Nigeria</span>
                <span>World</span>
                <span>Sport</span>
            </div>
        </div>
    </div>

</body>
</html>
