<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Arena - Question</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #1d3557 0%, #0b132b 45%, #050814 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .quiz-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 0;
        }

        .quiz-card {
            width: 100%;
            max-width: 880px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        .quiz-header {
            padding: 28px 28px 10px;
        }

        .quiz-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 18px;
        }

        .meta-left p {
            margin-bottom: 6px;
            color: rgba(255,255,255,0.9);
            font-size: 0.96rem;
        }

        .meta-left strong {
            color: #fff;
        }

        .timer-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 11px 16px;
            font-weight: 600;
            white-space: nowrap;
            min-width: 150px;
            text-align: center;
        }

        .timer-number {
            color: #f4b400;
            font-weight: 700;
        }

        .progress-wrap {
            margin-bottom: 8px;
        }

        .question-count {
            color: #f4b400;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 0.98rem;
        }

        .progress {
            height: 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #f4b400, #ffd24d);
        }

        .quiz-body {
            padding: 6px 28px 28px;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.55;
            margin-bottom: 26px;
        }

        .option-grid {
            display: grid;
            gap: 14px;
        }

        .option-btn {
            width: 100%;
            border: 1.5px solid rgba(255,255,255,0.22);
            color: #fff;
            background: rgba(255,255,255,0.05);
            text-align: left;
            padding: 18px 18px;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.25s ease;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
        }

        .option-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.45);
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background-color: #198754 !important;
            border-color: #198754 !important;
            color: #ffffff !important;
        }

        .option-btn.wrong {
            background-color: #dc3545 !important;
            border-color: #dc3545 !important;
            color: #ffffff !important;
        }

        .blink-green {
            animation: blinkGreen 0.6s ease-in-out 3;
        }

        @keyframes blinkGreen {
            0% { background-color: #198754; }
            50% { background-color: #56c271; }
            100% { background-color: #198754; }
        }

        .option-content {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .option-badge {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.12);
            font-weight: 700;
            font-size: 0.95rem;
        }

        .option-text {
            line-height: 1.5;
            padding-top: 4px;
        }

        @media (max-width: 768px) {
            .quiz-wrapper {
                padding: 18px 0;
            }

            .quiz-card {
                border-radius: 22px;
                margin: 0 10px;
            }

            .quiz-header {
                padding: 22px 18px 10px;
            }

            .quiz-body {
                padding: 6px 18px 22px;
            }

            .quiz-title {
                font-size: 1.8rem;
            }

            .question-text {
                font-size: 1.12rem;
                margin-bottom: 20px;
            }

            .option-btn {
                padding: 14px 14px;
                font-size: 0.96rem;
                border-radius: 16px;
            }

            .timer-box {
                width: 100%;
            }

            .meta-row {
                flex-direction: column;
                align-items: stretch;
            }

            .option-badge {
                width: 32px;
                height: 32px;
                min-width: 32px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="container quiz-wrapper">
    <div class="quiz-card">
        <div class="quiz-header">
            <h2 class="quiz-title">🎮 Quiz Arena</h2>

            <div class="meta-row">
                <div class="meta-left">
                    <p><strong>Player:</strong> {{ player_name }}</p>
                    <p><strong>Category:</strong> {{ category }}</p>
                </div>

                <div class="timer-box">
                    ⏱ Time left: <span id="timer" class="timer-number">{{ question_timer }}</span>s
                </div>

          <div class="progress mt-3" style="height: 8px;">
              <div id="timerBar" class="progress-bar bg-warning" role="progressbar" style="width: 100%;"></div>
           </div>
        </div>

            <div class="progress-wrap">
                <p class="question-count">Question {{ current }} of {{ total }}</p>
                <div class="progress">
                    <div class="progress-bar" role="progressbar"
                         style="width: {% widthratio current total 100 %}%"
                         aria-valuenow="{{ current }}" aria-valuemin="0" aria-valuemax="{{ total }}">
                    </div>
                </div>
            </div>
        </div>

        <div class="quiz-body">
            <h4 class="question-text">{{ question.text }}</h4>

            <form method="POST" id="quizForm">
                {% csrf_token %}
                <input type="hidden" name="answer" id="answerInput">

                <div class="option-grid">
                    <button type="button" class="option-btn" data-option="1">
                        <div class="option-content">
                            <div class="option-badge">A</div>
                            <div class="option-text">{{ question.option1 }}</div>
                        </div>
                    </button>

                    <button type="button" class="option-btn" data-option="2">
                        <div class="option-content">
                            <div class="option-badge">B</div>
                            <div class="option-text">{{ question.option2 }}</div>
                        </div>
                    </button>

                    <button type="button" class="option-btn" data-option="3">
                        <div class="option-content">
                            <div class="option-badge">C</div>
                            <div class="option-text">{{ question.option3 }}</div>
                        </div>
                    </button>

                    <button type="button" class="option-btn" data-option="4">
                        <div class="option-content">
                            <div class="option-badge">D</div>
                            <div class="option-text">{{ question.option4 }}</div>
                        </div>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const correctAnswer = "{{ question.correct_option }}";
const optionButtons = document.querySelectorAll(".option-btn");
const answerInput = document.getElementById("answerInput");
const quizForm = document.getElementById("quizForm");
const timerElement = document.getElementById("timer");
const timerBar = document.getElementById("timerBar");

let timeLeft = {{ question_timer }};
let answered = false;
const totalTime = {{ question_timer }};

const countdown = setInterval(() => {
    timeLeft--;
    timerElement.textContent = timeLeft;

    const progressPercent = (timeLeft / totalTime) * 100;
    timerBar.style.width = progressPercent + "%";

    if (timeLeft <= 0) {
        clearInterval(countdown);

        if (!answered) {
            answered = true;
            disableOptions();
            setTimeout(() => {
                quizForm.submit();
            }, 500);
        }
    }
}, 1000);
    
    function disableOptions() {
        optionButtons.forEach(button => {
            button.disabled = true;
            button.style.pointerEvents = "none";
        });
    }

    optionButtons.forEach(button => {
        button.addEventListener("click", function () {
            if (answered) return;

            answered = true;
            clearInterval(countdown);

            const selectedOption = this.dataset.option;
            answerInput.value = selectedOption;

            disableOptions();

            if (selectedOption === correctAnswer) {
                this.classList.add("correct", "blink-green");
            } else {
                this.classList.add("wrong");

                optionButtons.forEach(btn => {
                    if (btn.dataset.option === correctAnswer) {
                        btn.classList.add("correct", "blink-green");
                    }
                });
            }

            setTimeout(() => {
                quizForm.submit();
            }, 1800);
        });
    });
</script>

</body>
</html>
